<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060c14">
<title>FORGE v2</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;700&family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060c14; --s1: #0c1520; --s2: #112030;
    --border: rgba(255,255,255,0.08);
    --cyan: #22d3ee; --orange: #f97316; --green: #4ade80; --red: #f43f5e;
    --t1: #f0f6ff; --t2: #8fa8c0; --t3: #3d5a73;
    --fd: 'Syne', sans-serif; --fb: 'Figtree', sans-serif; --fm: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: var(--fb); min-height: 100dvh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }
  
  /* Layout & Nav */
  .screen { display: none; flex-direction: column; min-height: 100dvh; animation: fadeUp 0.25s ease; padding-bottom: 80px; }
  .screen.active { display: flex; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .topbar { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--fd); font-size: 24px; font-weight: 800; }
  .logo em { color: var(--cyan); font-style: normal; }
  
  .nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; background: rgba(6,12,20,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0 env(safe-area-inset-bottom); z-index: 100; }
  .nav-btn { background: none; border: none; color: var(--t3); font-family: var(--fb); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: color 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-btn.active { color: var(--cyan); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* Interactive Body Map */
  .map-container { position: relative; width: 100%; padding: 30px; display: flex; justify-content: center; }
  .body-svg { width: 100%; max-width: 250px; overflow: visible; }
  .muscle { fill: var(--s2); stroke: var(--border); stroke-width: 2; transition: all 0.2s ease; cursor: pointer; }
  .muscle:active { fill: var(--cyan); transform: scale(0.98); }
  .muscle-label { font-family: var(--fm); font-size: 10px; fill: var(--t3); pointer-events: none; transition: fill 0.2s; }
  .muscle:active + .muscle-label { fill: #000; }

  /* Workout Logging */
  .w-header { padding: 20px; }
  .w-title { font-family: var(--fd); font-size: 22px; font-weight: 700; color: var(--cyan); }
  .ex-card { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin: 0 20px 12px; }
  .ex-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .ex-cue { font-size: 12px; color: var(--t2); margin-bottom: 12px; font-style: italic; }
  
  .log-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .log-input { background: var(--s2); border: 1px solid var(--border); color: var(--t1); font-family: var(--fm); padding: 8px; border-radius: 6px; width: 60px; text-align: center; }
  .btn-done { background: var(--s2); border: 1px solid var(--border); color: var(--t1); padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: all 0.15s; flex: 1; }
  .btn-done:active { transform: scale(0.95); }
  .btn-done.completed { background: var(--green); color: #000; border-color: var(--green); }

  /* Rest Timer Overlay */
  .timer-overlay { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 12px 24px; border-radius: 30px; font-family: var(--fm); font-weight: 700; display: none; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(34,211,238,0.3); z-index: 90; animation: fadeUp 0.3s ease; }
  .timer-overlay.active { display: flex; }
  .btn-skip { background: rgba(0,0,0,0.2); border: none; color: #000; padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; }
</style>
</head>
<body>

  <div class="topbar">
    <div class="logo">FOR<em>GE</em></div>
    <div style="font-family: var(--fm); font-size: 12px; color: var(--orange);">🔥 <span id="streakCount">0</span></div>
  </div>

  <div id="screen-home" class="screen active">
    <div style="padding: 20px 20px 0; text-align: center;">
      <h2 style="font-family: var(--fd); font-size: 18px;">Select Target Muscle</h2>
      <p style="font-size: 12px; color: var(--t2); margin-top: 4px;">Tapping routes to your programmed split.</p>
    </div>
    
    <div class="map-container">
      <svg class="body-svg" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
        <path class="muscle" onclick="startWorkout('thursday')" d="M50,80 Q40,90 35,110 L60,110 Z" />
        <path class="muscle" onclick="startWorkout('thursday')" d="M150,80 Q160,90 165,110 L140,110 Z" />
        <text x="15" y="90" class="muscle-label">DELTS</text>
        
        <path class="muscle" onclick="startWorkout('monday')" d="M65,85 Q100,90 135,85 L130,120 Q100,125 70,120 Z" />
        <text x="85" y="105" class="muscle-label">CHEST</text>
        
        <rect class="muscle" onclick="startWorkout('thursday')" x="25" y="115" width="25" height="60" rx="10" />
        <rect class="muscle" onclick="startWorkout('thursday')" x="150" y="115" width="25" height="60" rx="10" />
        <text x="0" y="150" class="muscle-label">ARMS</text>
        
        <path class="muscle" onclick="startWorkout('saturday')" d="M70,125 Q100,130 130,125 L120,190 Q100,200 80,190 Z" />
        <text x="88" y="160" class="muscle-label">CORE</text>
        
        <path class="muscle" onclick="startWorkout('tuesday')" d="M75,195 L55,300 L90,300 L95,195 Z" />
        <path class="muscle" onclick="startWorkout('tuesday')" d="M125,195 L145,300 L110,300 L105,195 Z" />
        <text x="155" y="250" class="muscle-label">QUADS</text>
        
        <rect class="muscle" onclick="startWorkout('tuesday')" x="60" y="305" width="25" height="50" rx="8" />
        <rect class="muscle" onclick="startWorkout('tuesday')" x="115" y="305" width="25" height="50" rx="8" />
      </svg>
    </div>
  </div>

  <div id="screen-train" class="screen">
    <div class="w-header">
      <div class="w-title" id="workoutTitle">Workout</div>
      <div style="font-size: 12px; color: var(--t2); margin-top: 4px;" id="workoutSub">Loading...</div>
    </div>
    <div id="exerciseList"></div>
  </div>

  <div class="timer-overlay" id="restTimer">
    <span>REST: <span id="timerText">01:00</span></span>
    <button class="btn-skip" onclick="skipTimer()">SKIP</button>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('home', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Home
    </button>
    <button class="nav-btn" onclick="switchTab('train', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M3 8h3m12 0h3M3 16h3m12 0h3"/></svg>
      Train
    </button>
  </nav>

<script>
  // PWA Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup failed: ', err));
    });
  }

  // Database (Condensed from your original logic)
  const WORKOUTS = {
    monday: { name: 'Upper A', sub: 'Chest & Back', exs: [
      { id: 'incline_db', name: 'Incline DB Press', cue: 'Elbows ~45°. Neutral grip protects shoulder.', sets: 3 },
      { id: 'cable_row', name: 'Seated Cable Row', cue: 'Retract blade FIRST, then pull arm.', sets: 3 },
      { id: 'lat_pull', name: 'Lat Pulldown', cue: 'Pull to upper chest, lean back slightly.', sets: 3 }
    ]},
    tuesday: { name: 'Lower A', sub: 'Machine Quads + Calves', exs: [
      { id: 'leg_press', name: 'Leg Press', cue: 'Feet neutral width. Full range.', sets: 3 },
      { id: 'leg_ext', name: 'Leg Extensions', cue: '3-sec eccentric. Do NOT drop the weight.', sets: 3 },
      { id: 'leg_curl', name: 'Leg Curls', cue: 'Control the negative. No jerking.', sets: 3 }
    ]},
    thursday: { name: 'Upper B', sub: 'Shoulders & Arms', exs: [
      { id: 'seated_press', name: 'Seated DB Press', cue: 'PAIN RULE: Stop if pain >3/10.', sets: 3 },
      { id: 'rev_pec', name: 'Reverse Pec Deck', cue: 'Control the return. No momentum.', sets: 4 },
      { id: 'hammer_curl', name: 'Hammer Curls', cue: 'Neutral grip, strict reps.', sets: 3 }
    ]},
    saturday: { name: 'Fat Loss Sweeper', sub: 'Cardio & Core', exs: [
      { id: 'deadbug', name: 'Deadbugs', cue: 'Arm goes overhead = bonus serratus activation.', sets: 3 },
      { id: 'plank', name: 'Forearm Plank', cue: 'Forearms ONLY — no shoulder load.', sets: 3 }
    ]}
  };

  // State
  let timerInterval;
  let timeRemaining = 0;

  // UI Routing
  function switchTab(tab, btnElement) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(`screen-${tab}`).classList.add('active');
    
    if(btnElement) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btnElement.classList.add('active');
    }
  }

  // Workout Generation
  function startWorkout(dayKey) {
    const w = WORKOUTS[dayKey];
    if(!w) return;
    
    document.getElementById('workoutTitle').innerText = w.name;
    document.getElementById('workoutSub').innerText = w.sub;
    
    let html = '';
    w.exs.forEach(ex => {
      html += `
        <div class="ex-card">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-cue">${ex.cue}</div>
          <div class="log-grid">
      `;
      for(let i=0; i<ex.sets; i++) {
        html += `
          <div class="log-row">
            <span style="font-family:var(--fm); font-size:12px; color:var(--t3); width:20px;">${i+1}</span>
            <input type="number" class="log-input" placeholder="kg">
            <input type="number" class="log-input" placeholder="reps">
            <button class="btn-done" onclick="completeSet(this)">LOG SET</button>
          </div>
        `;
      }
      html += `</div></div>`;
    });
    
    document.getElementById('exerciseList').innerHTML = html;
    switchTab('train');
    document.querySelectorAll('.nav-btn')[1].classList.add('active');
    document.querySelectorAll('.nav-btn')[0].classList.remove('active');
  }

  // Interaction Logging & Timers
  function completeSet(btn) {
    if(btn.classList.contains('completed')) {
      btn.classList.remove('completed');
      btn.innerText = 'LOG SET';
      return;
    }
    btn.classList.add('completed');
    btn.innerText = '✓ DONE';
    startTimer(60); // 60s default rest
  }

  function startTimer(seconds) {
    clearInterval(timerInterval);
    timeRemaining = seconds;
    const overlay = document.getElementById('restTimer');
    overlay.classList.add('active');
    
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeRemaining--;
      updateTimerDisplay();
      if(timeRemaining <= 0) skipTimer();
    }, 1000);
  }

  function updateTimerDisplay() {
    const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
    const s = (timeRemaining % 60).toString().padStart(2, '0');
    document.getElementById('timerText').innerText = `${m}:${s}`;
  }

  function skipTimer() {
    clearInterval(timerInterval);
    document.getElementById('restTimer').classList.remove('active');
  }
</script>
</body>
</html>
