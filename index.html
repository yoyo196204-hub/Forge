<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<title>FORGE v3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b; --surface: #18181b; --surface-active: #27272a;
    --border: #3f3f46; --text: #fafafa; --text-muted: #a1a1aa;
    --accent: #22d3ee; --green: #4ade80; --amber: #fbbf24; --red: #f43f5e;
    --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100dvh; max-width: 500px; margin: 0 auto; overflow-x: hidden; }

  /* Typography & Layout */
  .header { padding: 24px 20px 12px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); }
  .title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }

  .scroll-container { padding: 20px; padding-bottom: 100px; }

  /* Daily Status Pill */
  .status-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; transition: transform 0.2s var(--spring); cursor: pointer; }
  .status-pill:active { transform: scale(0.96); background: var(--surface-active); }
  .pill-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(34, 211, 238, 0.1); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  
  /* Exercise Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .ex-name { font-size: 16px; font-weight: 600; }
  .ex-meta { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .ex-cue { font-size: 13px; color: var(--accent); margin-bottom: 16px; line-height: 1.4; padding-left: 10px; border-left: 2px solid var(--accent); }

  /* Fidgety Set Logging */
  .set-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 8px; }
  .set-btn { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; height: 48px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--text); font-weight: 700; transition: all 0.3s var(--spring); cursor: pointer; }
  
  /* Interaction States */
  .set-btn:active { transform: scale(0.85); border-color: var(--text-muted); }
  .set-btn.done { background: var(--text); color: var(--bg); border-color: var(--text); transform: scale(1.05); }
  
  /* Traffic Light Pain Rule */
  .pain-panel { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; animation: slideDown 0.2s ease forwards; }
  .pain-btn { padding: 10px; border-radius: 8px; border: none; font-size: 12px; font-weight: 800; cursor: pointer; transition: transform 0.1s; }
  .pain-btn:active { transform: scale(0.9); }
  .pain-g { background: rgba(74, 222, 128, 0.1); color: var(--green); border: 1px solid var(--green); }
  .pain-a { background: rgba(251, 191, 36, 0.1); color: var(--amber); border: 1px solid var(--amber); }
  .pain-r { background: rgba(244, 63, 94, 0.1); color: var(--red); border: 1px solid var(--red); }

  /* Navigation Bar */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; padding: 16px 20px env(safe-area-inset-bottom); justify-content: space-around; }
  .nav-item { color: var(--text-muted); font-size: 12px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
  .nav-item.active { color: var(--text); }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <div class="header">
    <div>
      <div class="title">FORGE</div>
      <div class="subtitle" id="dateDisplay">Loading...</div>
    </div>
  </div>

  <div class="scroll-container" id="workoutContainer">
    </div>

  <div class="nav">
    <div class="nav-item active">● TODAY</div>
    <div class="nav-item">LOG</div>
    <div class="nav-item">PROFILE</div>
  </div>

<script>
  // Utility: Haptic Feedback
  function triggerHaptic(type) {
    if (!navigator.vibrate) return;
    if (type === 'light') navigator.vibrate(30);
    if (type === 'heavy') navigator.vibrate([40, 30, 40]);
    if (type === 'success') navigator.vibrate([30, 50, 30]);
  }

  // Database based on the provided PDF Protocol
  const PROTOCOL = {
    daily: {
      title: "Morning Mobility",
      subtitle: "5 Min • Non-Negotiable",
      exs: [
        { name: "Sleeper Stretch", meta: "3x30s", cue: "Scapula flat on floor. Deep stretch back of shoulder." },
        { name: "Pec Minor Stretch", meta: "3x30s", cue: "Hip height. NOT high doorway position." }
      ]
    },
    monday: {
      title: "Upper A",
      subtitle: "Chest & Back",
      exs: [
        { name: "Dead Hangs", meta: "2x30s", cue: "Fully relax shoulders. Decompress first." },
        { name: "Wall Slides", meta: "3x12", cue: "Forearms on wall, protract at top, push wall away." },
        { name: "Y-Raises (Incline)", meta: "3x12 • 1-2kg", cue: "Thumbs up. Squeeze blades DOWN not just in.", trackPain: true },
        { name: "Incline DB Press", meta: "3x12 • Mod", cue: "No wrist flare. Elbows ~45°." },
        { name: "Seated Cable Row", meta: "3x12 • Mod", cue: "Retract blade FIRST, then pull arm." },
        { name: "Cardio / Anki", meta: "40m • Zone 2", cue: "Incline treadmill. Keep moving forward. Charaiveti." }
      ]
    }
    // Add Tuesday, Wednesday, etc. here following the same format.
  };

  function init() {
    const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    const today = new Date();
    const dayKey = days[today.getDay()];
    
    document.getElementById('dateDisplay').innerText = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();

    // Default to Monday for testing if today's workout isn't filled in the JSON yet
    const workout = PROTOCOL[dayKey] || PROTOCOL['monday']; 
    const mobility = PROTOCOL.daily;

    let html = `
      <div class="status-pill" onclick="triggerHaptic('light')">
        <div class="pill-icon">🌅</div>
        <div>
          <div style="font-weight: 600; font-size: 15px;">${mobility.title}</div>
          <div style="font-size: 12px; color: var(--text-muted);">${mobility.subtitle}</div>
        </div>
      </div>
      
      <div style="margin-bottom: 16px; padding-left: 4px;">
        <div style="font-size: 20px; font-weight: 800;">${workout.title}</div>
        <div style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--accent);">${workout.subtitle}</div>
      </div>
    `;

    workout.exs.forEach((ex, index) => {
      const sets = parseInt(ex.meta.charAt(0)) || 1; // Extracts the first number for set count
      
      let setButtons = '';
      for(let i=1; i<=sets; i++) {
        setButtons += `<div class="set-btn" onclick="toggleSet(this, ${ex.trackPain})">${i}</div>`;
      }

      html += `
        <div class="card">
          <div class="card-header">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.meta}</div>
          </div>
          <div class="ex-cue">${ex.cue}</div>
          <div class="set-grid">${setButtons}</div>
          ${ex.trackPain ? `
            <div class="pain-panel">
              <button class="pain-btn pain-g" onclick="logPain(this)">≤3 OK</button>
              <button class="pain-btn pain-a" onclick="logPain(this)">4-5 -20%</button>
              <button class="pain-btn pain-r" onclick="logPain(this)">>5 STOP</button>
            </div>
          ` : ''}
        </div>
      `;
    });

    document.getElementById('workoutContainer').innerHTML = html;
  }

  function toggleSet(btn, trackPain) {
    if (btn.classList.contains('done')) {
      btn.classList.remove('done');
      triggerHaptic('light');
      if(trackPain) btn.parentElement.nextElementSibling.style.display = 'none';
    } else {
      btn.classList.add('done');
      triggerHaptic('success');
      
      // If pain tracking is enabled for this exercise, slide down the Traffic Light system
      if(trackPain) {
        const panel = btn.parentElement.nextElementSibling;
        panel.style.display = 'grid';
      }
    }
  }

  function logPain(btn) {
    triggerHaptic('heavy');
    const panel = btn.parentElement;
    panel.style.display = 'none'; // Hide after logging
  }

  // Run on load
  init();
</script>
</body>
</html>
